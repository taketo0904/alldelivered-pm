<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AllDelivered PM</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-brand">
      <div class="login-icon">AD</div>
      <div class="login-logo">AllDelivered</div>
      <div class="login-subtitle">Project Management</div>
    </div>
    <form id="loginForm">
      <div class="form-group login-field">
        <label>User ID</label>
        <div class="login-input-wrap">
          <span class="login-input-icon">👤</span>
          <input type="text" id="loginId" placeholder="ユーザーIDを入力" autocomplete="username" required>
        </div>
      </div>
      <div class="form-group login-field">
        <label>Password</label>
        <div class="login-input-wrap">
          <span class="login-input-icon">🔒</span>
          <input type="password" id="loginPw" placeholder="パスワードを入力" autocomplete="current-password" required>
        </div>
      </div>
      <div class="login-remember">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.8rem;color:var(--text-sub);">
          <input type="checkbox" id="loginRemember"> ログイン状態を保持
        </label>
      </div>
      <button type="submit" class="btn btn-primary login-btn">ログイン</button>
    </form>
    <div class="login-error" id="loginError">ユーザーIDまたはパスワードが正しくありません</div>
    <div class="login-footer">
      <span style="color:var(--text-sub);font-size:0.7rem;opacity:0.5;">Powered by AllDelivered Inc.</span>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    (function() {
      const session = getSession();
      if (session) {
        if (session.role === 'client') {
          window.location.href = 'portal.html';
        } else {
          window.location.href = 'dashboard.html';
        }
        return;
      }
    })();

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const id = document.getElementById('loginId').value.trim();
      const pw = document.getElementById('loginPw').value;
      const users = getUsers();
      const user = users.find(u => u.id === id && u.password === pw);

      if (!user) {
        document.getElementById('loginError').style.display = 'block';
        return;
      }

      document.getElementById('loginError').style.display = 'none';
      setSession({
        userId: user.id,
        role: user.role,
        name: user.name,
        clientId: user.clientId || null,
        loginAt: new Date().toISOString()
      });

      if (user.role === 'client') {
        window.location.href = 'portal.html';
      } else {
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
