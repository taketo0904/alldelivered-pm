<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案件詳細 — AllDelivered PM</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>
  <button class="hamburger" aria-label="メニュー">☰</button>
  <div class="sidebar-overlay"></div>
  <div class="app-layout">
    <nav class="sidebar">
      <div class="sidebar-logo">AllDelivered</div>
      <div class="sidebar-nav"></div>
      <div class="sidebar-user"></div>
    </nav>
    <main class="main-content">
      <div class="page-header"><div><a href="dashboard.html" style="font-size:0.85rem;">← ダッシュボード</a></div></div>
      <div class="case-header" id="caseHeader"></div>
      <div id="sectionsContainer"></div>
    </main>
  </div>
  <div class="modal-overlay" id="genericModal">
    <div class="modal">
      <div class="modal-header"><h2 id="genericModalTitle"></h2><button class="modal-close" onclick="closeModal('genericModal')">&times;</button></div>
      <div id="genericModalBody"></div>
    </div>
  </div>
  <script src="app.js"></script>
  <script>
    const session = checkAuth(['admin', 'partner']);
    if (!session) throw new Error('No session');
    initSidebar(session, caseId);
    const params = new URLSearchParams(window.location.search);
    const caseId = params.get('id');
    if (!caseId) { window.location.href = 'dashboard.html'; throw new Error('No case id'); }
    let currentCase = getCaseById(caseId);
    if (!currentCase) { window.location.href = 'dashboard.html'; throw new Error('Case not found'); }
    const canEdit = session.role === 'admin' || session.role === 'partner';

    function reload() { currentCase = getCaseById(caseId); renderAll(); }
    function save() { updateCase(currentCase); }
    function renderAll() { renderHeader(); renderSections(); initCollapsible(); }

    function renderHeader() {
      const c = currentCase;
      document.getElementById('caseHeader').innerHTML = `
        <div class="case-header-top">
          <div><div class="case-client">${c.clientName}</div><div class="case-name">${c.name}</div></div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            ${statusBadge(c.status)}
            ${canEdit ? '<button class="btn btn-sm" onclick="editCaseInfo()">編集</button>' : ''}
            ${canEdit && c.status === 'proposal' ? '<button class="btn btn-sm" style="background:var(--accent);color:var(--bg);font-weight:600;border-color:var(--accent);" onclick="confirmContractFromDetail()">🎉 契約成立</button>' : ''}
            ${canEdit && c.status !== 'archived' ? '<button class="btn btn-sm" style="color:var(--text-sub);border-color:var(--border);" onclick="archiveCase()" title="アーカイブ">📦 アーカイブ</button>' : ''}
            ${canEdit && c.status === 'archived' ? '<button class="btn btn-sm" style="color:#6dbf7e;" onclick="unarchiveCase()" title="アーカイブ解除">↩ 復元</button>' : ''}
            <button class="btn btn-sm" onclick="generateProposal()" title="提案書を印刷/PDF保存">📄 提案書</button>
            <button class="btn btn-sm" onclick="generateMonthlyReport()" title="月次レポートを印刷/PDF保存">📊 月次レポート</button>
            <button class="btn btn-sm" onclick="generateInvoice()" title="請求書を印刷/PDF保存">🧾 請求書</button>
          </div>
        </div>
        <div class="case-meta">
          <span>フェーズ: ${c.phase}</span><span>担当: ${assigneeName(c.assignee)}</span>
          <span>期間: ${fmtDate(c.startDate)} 〜 ${fmtDate(c.endDate)}</span>
          ${c.consultingFee ? '<span>コンサル費: ¥' + fmt(c.consultingFee) + '</span>' : ''}
          ${c.monthlyFee ? '<span>顧問料: ¥' + fmt(c.monthlyFee) + '/月</span>' : ''}
        </div>`;
    }

    function renderSections() {
      document.getElementById('sectionsContainer').innerHTML =
        renderGanttSection() + renderTodaySection() + renderKPISection() +
        renderROISection() + renderFollowupSection() + renderSatisfactionSection() + renderMinutesSection() +
        renderResourcesSection() + (canEdit ? renderBillingSection() : '');
      renderSatChart();
    }

    // ===== GANTT =====
    let ganttViewMode = 'month';
    function setGanttView(mode) { ganttViewMode = mode; renderSections(); }

    const DAY_NAMES = ['日','月','火','水','木','金','土'];

    function renderGanttSection() {
      const c = currentCase, tasks = c.gantt || [];

      const viewSwitcher = `<div class="gantt-view-switcher">
        <button class="${ganttViewMode==='month'?'active':''}" onclick="setGanttView('month')">月</button>
        <button class="${ganttViewMode==='week'?'active':''}" onclick="setGanttView('week')">週</button>
        <button class="${ganttViewMode==='day'?'active':''}" onclick="setGanttView('day')">日</button>
      </div>`;

      const actionBar = `<div class="section-actions" style="display:flex;align-items:center;gap:10px;">
        ${viewSwitcher}
        ${canEdit ? '<button class="btn btn-sm" onclick="addGanttTask()">＋ タスク追加</button>' : ''}
      </div>`;

      if (tasks.length === 0) {
        return `<div class="section"><div class="section-header"><h3>📊 ガントチャート</h3><span class="toggle-icon">▼</span></div><div class="section-body">${actionBar}<div class="empty-state">タスクがありません</div></div></div>`;
      }

      const allDates = tasks.flatMap(t => [t.startDate, t.endDate]).concat([c.startDate, c.endDate]).filter(Boolean);
      const dataMin = allDates.reduce((a,b) => a<b?a:b);
      const dataMax = allDates.reduce((a,b) => a>b?a:b);

      // Determine visible range and dayWidth per view mode
      let minDate, maxDate, DAY_W;
      if (ganttViewMode === 'month') {
        minDate = dataMin; maxDate = dataMax;
        const total = daysBetween(minDate, maxDate) + 1;
        DAY_W = Math.max(6, Math.min(28, 780 / total));
      } else if (ganttViewMode === 'week') {
        minDate = getMondayOf(dataMin);
        const lastSunday = dateAddDays(getMondayOf(dataMax), 6);
        maxDate = lastSunday > dataMax ? dataMax : lastSunday;
        maxDate = dataMax; // show full range
        minDate = getMondayOf(dataMin);
        DAY_W = 22;
      } else { // day
        minDate = dataMin; maxDate = dataMax;
        DAY_W = 32;
      }

      const totalDays = daysBetween(minDate, maxDate) + 1;
      const timelineW = totalDays * DAY_W;
      const LABEL_W = 300;
      const today = todayStr();
      const todayOff = dayOffset(minDate, today);

      // ---- Build header rows ----
      let hRow1 = '', hRow2 = '';

      if (ganttViewMode === 'month') {
        let cur = new Date(minDate);
        const endD = new Date(maxDate);
        while (cur <= endD) {
          const mEnd = new Date(cur.getFullYear(), cur.getMonth()+1, 0);
          const visEnd = mEnd < endD ? mEnd : endD;
          const visStartStr = cur.toISOString().slice(0,10);
          const clampStart = visStartStr < minDate ? minDate : visStartStr;
          const days = daysBetween(clampStart, visEnd.toISOString().slice(0,10)) + 1;
          hRow1 += `<div class="gantt-header-cell" style="width:${days*DAY_W}px">${cur.getFullYear()}/${cur.getMonth()+1}</div>`;
          cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
        }
      } else if (ganttViewMode === 'week') {
        // Row1 = week ranges, Row2 = day names
        const weekStart = getMondayOf(minDate);
        let cur = new Date(weekStart);
        const endD = new Date(maxDate);
        while (cur <= endD) {
          const sun = new Date(cur); sun.setDate(sun.getDate()+6);
          const visS = cur < new Date(minDate) ? new Date(minDate) : cur;
          const visE = sun > endD ? endD : sun;
          const visSDStr = visS.toISOString().slice(0,10);
          const visEDStr = visE.toISOString().slice(0,10);
          const days = daysBetween(visSDStr, visEDStr) + 1;
          hRow1 += `<div class="gantt-header-cell" style="width:${days*DAY_W}px;font-size:0.65rem;">${visS.getMonth()+1}/${visS.getDate()}〜${visE.getMonth()+1}/${visE.getDate()}</div>`;
          for (let d = 0; d < 7; d++) {
            const dd = new Date(cur); dd.setDate(dd.getDate()+d);
            const dStr = dd.toISOString().slice(0,10);
            if (dStr < minDate || dStr > maxDate) continue;
            const isWE = dd.getDay()===0||dd.getDay()===6;
            const isToday = dStr === today;
            hRow2 += `<div class="gantt-header-cell gantt-day-cell${isWE?' gantt-we':''}${isToday?' gantt-today-col':''}" style="width:${DAY_W}px;">${DAY_NAMES[dd.getDay()]}</div>`;
          }
          cur.setDate(cur.getDate()+7);
        }
      } else { // day
        let cur = new Date(minDate);
        const endD = new Date(maxDate);
        while (cur <= endD) {
          const dStr = cur.toISOString().slice(0,10);
          const isWE = cur.getDay()===0||cur.getDay()===6;
          const isToday = dStr===today;
          hRow1 += `<div class="gantt-header-cell gantt-day-cell${isWE?' gantt-we':''}${isToday?' gantt-today-col':''}" style="width:${DAY_W}px;font-size:0.62rem;">${cur.getMonth()+1}/${cur.getDate()}</div>`;
          hRow2 += `<div class="gantt-header-cell gantt-day-cell${isWE?' gantt-we':''}${isToday?' gantt-today-col':''}" style="width:${DAY_W}px;">${DAY_NAMES[cur.getDay()]}</div>`;
          cur.setDate(cur.getDate()+1);
        }
      }

      // ---- Weekend stripe overlay ----
      function weStripes() {
        if (ganttViewMode === 'month') return '';
        let s = '';
        let cur = new Date(minDate);
        const endD = new Date(maxDate);
        while (cur <= endD) {
          if (cur.getDay()===0||cur.getDay()===6) {
            const off = dayOffset(minDate, cur.toISOString().slice(0,10));
            s += `<div style="position:absolute;left:${off*DAY_W}px;top:0;width:${DAY_W}px;height:100%;background:rgba(255,255,255,0.025);pointer-events:none;"></div>`;
          }
          cur.setDate(cur.getDate()+1);
        }
        return s;
      }

      // ---- Task rows ----
      const taskRows = tasks.map(t => {
        const barOff = dayOffset(minDate, t.startDate);
        const barDur = daysBetween(t.startDate, t.endDate) + 1;
        const clampOff = Math.max(0, barOff);
        const overflowLeft = Math.max(0, -barOff);
        const clampDur = Math.max(0, Math.min(barDur - overflowLeft, totalDays - clampOff));
        const dateLabel = ganttViewMode !== 'month' ? `<span style="font-size:0.7rem;color:var(--text-sub);margin-left:4px;">${fmtDate(t.startDate)}〜${fmtDate(t.endDate)}</span>` : '';
        return `<div style="display:flex;border-bottom:1px solid var(--border);align-items:center;min-height:36px;">
          <div style="min-width:${LABEL_W}px;padding:6px 8px;display:flex;align-items:center;gap:6px;font-size:0.8rem;overflow:hidden;">
            ${canEdit ? `<input type="checkbox" ${t.done?'checked':''} onchange="toggleGanttDone('${t.id}',this.checked)">` : (t.done?'✓':'○')}
            ${priorityDot(t.priority)}
            <span style="${t.done?'text-decoration:line-through;color:var(--text-sub)':''}white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.name}${dateLabel}</span>
            <span class="task-assignee" style="flex-shrink:0;">${assigneeName(t.assignee)}</span>
            ${canEdit ? `<button class="btn-icon" style="width:22px;height:22px;font-size:0.65rem;flex-shrink:0;" onclick="editGanttTask('${t.id}')">✎</button><button class="btn-icon btn-danger" style="width:22px;height:22px;font-size:0.65rem;flex-shrink:0;" onclick="deleteGanttTask('${t.id}')">×</button>` : ''}
          </div>
          <div class="gantt-timeline" style="width:${timelineW}px;height:36px;position:relative;flex-shrink:0;">
            ${weStripes()}
            ${clampDur > 0 ? `<div class="gantt-bar priority-${t.priority}${t.done?' done':''}" style="left:${clampOff*DAY_W}px;width:${clampDur*DAY_W}px;top:8px;height:20px;"></div>` : ''}
            ${todayOff>=0&&todayOff<=totalDays ? `<div class="gantt-today-line" style="left:${todayOff*DAY_W}px;"></div>` : ''}
          </div>
        </div>`;
      }).join('');

      const ganttHtml = `<div class="gantt-wrapper"><div style="min-width:${LABEL_W+timelineW}px;">
        <div style="display:flex;"><div style="min-width:${LABEL_W}px;"></div><div class="gantt-header-row" style="width:${timelineW}px;">${hRow1}</div></div>
        ${hRow2 ? `<div style="display:flex;"><div style="min-width:${LABEL_W}px;background:var(--surface);"></div><div class="gantt-header-row gantt-header-sub" style="width:${timelineW}px;">${hRow2}</div></div>` : ''}
        ${taskRows}
      </div></div>`;

      return `<div class="section"><div class="section-header"><h3>📊 ガントチャート</h3><span class="toggle-icon">▼</span></div><div class="section-body">
        ${actionBar}${ganttHtml}</div></div>`;
    }

    function toggleGanttDone(id, done) { const t = currentCase.gantt.find(x => x.id === id); if (t) { t.done = done; save(); reload(); } }

    function addGanttTask() {
      showGenericModal('タスク追加', `<form onsubmit="submitGanttTask(event)">
        <div class="form-group"><label>タスク名</label><input type="text" id="gTaskName" required></div>
        <div class="form-row"><div class="form-group"><label>開始日</label><input type="date" id="gTaskStart" required></div><div class="form-group"><label>終了日</label><input type="date" id="gTaskEnd" required></div></div>
        <div class="form-row"><div class="form-group"><label>担当者</label><select id="gTaskAssignee"><option value="admin">Taketo</option><option value="kanchan">Kanchan</option><option value="client">クライアント</option></select></div>
        <div class="form-group"><label>優先度</label><select id="gTaskPriority"><option value="high">高</option><option value="medium">中</option><option value="low">低</option></select></div></div>
        <div class="form-actions"><button type="button" class="btn" onclick="closeModal('genericModal')">キャンセル</button><button type="submit" class="btn btn-primary">追加</button></div></form>`);
    }
    function submitGanttTask(e) {
      e.preventDefault();
      currentCase.gantt.push({ id: generateId('task'), name: document.getElementById('gTaskName').value, startDate: document.getElementById('gTaskStart').value, endDate: document.getElementById('gTaskEnd').value, assignee: document.getElementById('gTaskAssignee').value, priority: document.getElementById('gTaskPriority').value, done: false });
      save(); closeModal('genericModal'); reload(); showToast('タスクを追加しました');
    }
    function editGanttTask(taskId) {
      const t = currentCase.gantt.find(x => x.id === taskId); if (!t) return;
      showGenericModal('タスク編集', `<form onsubmit="submitEditGantt(event, '${taskId}')">
        <div class="form-group"><label>タスク名</label><input type="text" id="gEditName" value="${t.name}" required></div>
        <div class="form-row"><div class="form-group"><label>開始日</label><input type="date" id="gEditStart" value="${t.startDate}" required></div><div class="form-group"><label>終了日</label><input type="date" id="gEditEnd" value="${t.endDate}" required></div></div>
        <div class="form-row"><div class="form-group"><label>担当者</label><select id="gEditAssignee"><option value="admin" ${t.assignee==='admin'?'selected':''}>Taketo</option><option value="kanchan" ${t.assignee==='kanchan'?'selected':''}>Kanchan</option><option value="client" ${t.assignee==='client'?'selected':''}>クライアント</option></select></div>
        <div class="form-group"><label>優先度</label><select id="gEditPriority"><option value="high" ${t.priority==='high'?'selected':''}>高</option><option value="medium" ${t.priority==='medium'?'selected':''}>中</option><option value="low" ${t.priority==='low'?'selected':''}>低</option></select></div></div>
        <div class="form-actions"><button type="button" class="btn" onclick="closeModal('genericModal')">キャンセル</button><button type="submit" class="btn btn-primary">保存</button></div></form>`);
    }
    function submitEditGantt(e, taskId) {
      e.preventDefault(); const t = currentCase.gantt.find(x => x.id === taskId); if (!t) return;
      t.name = document.getElementById('gEditName').value; t.startDate = document.getElementById('gEditStart').value;
      t.endDate = document.getElementById('gEditEnd').value; t.assignee = document.getElementById('gEditAssignee').value;
      t.priority = document.getElementById('gEditPriority').value;
      save(); closeModal('genericModal'); reload(); showToast('タスクを更新しました');
    }
    function deleteGanttTask(taskId) { if (!confirm('削除しますか？')) return; currentCase.gantt = currentCase.gantt.filter(t => t.id !== taskId); save(); reload(); showToast('削除しました'); }

    // ===== TODAY =====
    function renderTodaySection() {
      const today = todayStr(); let tasks = [];
      (currentCase.gantt || []).forEach(t => { if (t.endDate === today || t.startDate === today) tasks.push({ text: t.name, assignee: t.assignee, priority: t.priority, done: t.done, type: 'gantt', id: t.id }); });
      (currentCase.minutes || []).forEach(m => { (m.nextActions || []).forEach((na, i) => { if (na.dueDate === today) tasks.push({ text: na.text, assignee: na.assignee, priority: 'medium', done: na.done, type: 'minute', minuteId: m.id, actionIdx: i }); }); });
      (currentCase.followups || []).forEach(f => { if (f.date === today) tasks.push({ text: f.content, assignee: 'admin', priority: 'medium', done: f.status === '対応済', type: 'followup', id: f.id }); });
      let html = tasks.length === 0 ? '<div class="empty-state">今日のタスクはありません</div>' :
        '<ul class="today-tasks">' + tasks.map(t => `<li class="today-task-item">
          ${canEdit ? '<input type="checkbox" ' + (t.done ? 'checked' : '') + ' onchange="toggleTodayTask(\'' + t.type + '\', \'' + (t.id || '') + '\', ' + (t.actionIdx !== undefined ? t.actionIdx : -1) + ', \'' + (t.minuteId || '') + '\', this.checked)">' : (t.done ? '✓' : '○')}
          ${priorityDot(t.priority)}<span style="${t.done ? 'text-decoration:line-through;color:var(--text-sub)' : ''};flex:1;">${t.text}</span>
          <span class="task-assignee">${assigneeName(t.assignee)}</span></li>`).join('') + '</ul>';
      return `<div class="section"><div class="section-header"><h3>📌 今日のタスク</h3><span class="toggle-icon">▼</span></div><div class="section-body">${html}</div></div>`;
    }
    function toggleTodayTask(type, id, actionIdx, minuteId, done) {
      if (type === 'gantt') { const t = currentCase.gantt.find(x => x.id === id); if (t) t.done = done; }
      else if (type === 'minute') { const m = currentCase.minutes.find(x => x.id === minuteId); if (m && m.nextActions[actionIdx] !== undefined) m.nextActions[actionIdx].done = done; }
      else if (type === 'followup') { const f = currentCase.followups.find(x => x.id === id); if (f) f.status = done ? '対応済' : '未対応'; }
      save(); reload();
    }

    // ===== KPI =====
    function renderKPISection() {
      const kpis = currentCase.kpis || [];
      let html = kpis.length === 0 ? '<div class="empty-state">KPIが設定されていません</div>' :
        '<div class="kpi-grid">' + kpis.map(k => {
          const pct = k.target ? Math.round((k.actual / k.target) * 100) : 0;
          const diff = k.prevActual !== undefined ? k.actual - k.prevActual : null;
          return `<div class="kpi-card">
            <div class="kpi-name">${k.name}${canEdit ? ' <button class="btn-icon" style="width:20px;height:20px;font-size:0.65rem;" onclick="editKPI(\'' + k.id + '\')">✎</button> <button class="btn-icon btn-danger" style="width:20px;height:20px;font-size:0.65rem;" onclick="deleteKPI(\'' + k.id + '\')">×</button>' : ''}</div>
            <div class="kpi-values"><span class="kpi-actual">${fmt(k.actual)}</span><span class="kpi-target">/ ${fmt(k.target)} ${k.unit}</span>
            ${diff !== null ? '<span class="kpi-diff ' + (diff >= 0 ? 'up' : 'down') + '">' + (diff >= 0 ? '↑' : '↓') + Math.abs(diff) + '</span>' : ''}</div>
            <div style="font-size:0.75rem;color:var(--text-sub);">達成率 ${pct}%</div>
            <div class="kpi-progress"><div class="kpi-fill" style="width:${Math.min(pct, 100)}%;background:${pct >= 100 ? 'var(--success)' : 'var(--error)'}"></div></div></div>`;
        }).join('') + '</div>';
      return `<div class="section"><div class="section-header"><h3>📈 KPI・レポートトラッキング</h3><span class="toggle-icon">▼</span></div><div class="section-body">
        ${canEdit ? '<div class="section-actions"><button class="btn btn-sm" onclick="addKPI()">＋ KPI追加</button></div>' : ''}${html}</div></div>`;
    }
    function addKPI() {
      showGenericModal('KPI追加', `<form onsubmit="submitKPI(event)">
        <div class="form-group"><label>項目名</label><input type="text" id="kpiName" required></div>
        <div class="form-row"><div class="form-group"><label>単位</label><input type="text" id="kpiUnit" required></div><div class="form-group"><label>目標値</label><input type="number" id="kpiTarget" required></div></div>
        <div class="form-row"><div class="form-group"><label>実績値</label><input type="number" id="kpiActual" value="0"></div><div class="form-group"><label>前回実績</label><input type="number" id="kpiPrev" value="0"></div></div>
        <div class="form-actions"><button type="button" class="btn" onclick="closeModal('genericModal')">キャンセル</button><button type="submit" class="btn btn-primary">追加</button></div></form>`);
    }
    function submitKPI(e) { e.preventDefault(); currentCase.kpis.push({ id: generateId('kpi'), name: document.getElementById('kpiName').value, unit: document.getElementById('kpiUnit').value, target: parseFloat(document.getElementById('kpiTarget').value), actual: parseFloat(document.getElementById('kpiActual').value), prevActual: parseFloat(document.getElementById('kpiPrev').value) }); save(); closeModal('genericModal'); reload(); showToast('KPIを追加しました'); }
    function editKPI(kpiId) {
      const k = currentCase.kpis.find(x => x.id === kpiId); if (!k) return;
      showGenericModal('KPI編集', `<form onsubmit="submitEditKPI(event, '${kpiId}')">
        <div class="form-group"><label>項目名</label><input type="text" id="kpiEditName" value="${k.name}" required></div>
        <div class="form-row"><div class="form-group"><label>単位</label><input type="text" id="kpiEditUnit" value="${k.unit}" required></div><div class="form-group"><label>目標値</label><input type="number" id="kpiEditTarget" value="${k.target}" required></div></div>
        <div class="form-row"><div class="form-group"><label>実績値</label><input type="number" id="kpiEditActual" value="${k.actual}"></div><div class="form-group"><label>前回実績</label><input type="number" id="kpiEditPrev" value="${k.prevActual || 0}"></div></div>
        <div class="form-actions"><button type="button" class="btn" onclick="closeModal('genericModal')">キャンセル</button><button type="submit" class="btn btn-primary">保存</button></div></form>`);
    }

    function calcROI(r) {
      const effect = (r.afterValue - r.beforeValue) * (r.unitPrice || 1);
      const invest = r.investmentAmount || 0;
      const roi = invest > 0 ? ((effect - invest) / invest * 100) : null;
      return { effect, roi };
    }
    function roiColor(roi) {
      if (roi === null) return 'var(--text-sub)';
      if (roi >= 100) return '#6dbf7e';
      if (roi >= 0) return 'var(--accent)';
      return 'var(--error)';
    }

      } else {
        html = '<div class="roi-grid">' + rois.map(r => {
          const { effect, roi } = calcROI(r);
          const roiStr = roi !== null ? (roi >= 0 ? '+' : '') + roi.toFixed(1) + '%' : '-';
          return `<div class="roi-card">

    // 月次レポート
    function generateMonthlyReport() {
      const c = currentCase;
      const now = new Date();
      const monthLabel = now.getFullYear() + '年' + (now.getMonth()+1) + '月';
      const latestSat = c.satisfaction && c.satisfaction.length > 0 ? c.satisfaction[c.satisfaction.length-1] : null;
      const totalTasks = (c.gantt || []).length;
      const doneTasks = (c.gantt || []).filter(t => t.done).length;
      const progress = totalTasks > 0 ? Math.round(doneTasks / totalTasks * 100) : 0;
      const latestMin = c.minutes && c.minutes.length > 0 ? c.minutes[c.minutes.length-1] : null;
      const nextActions = latestMin ? (latestMin.nextActions || []).filter(na => !na.done) : [];
      openPrintDoc('月次レポート', `
        <div class="header">
          <div><div class="company">AllDelivered</div><div style="font-size:12px;color:#555;margin-top:4px;">月次レポート — ${monthLabel}</div></div>
          <div class="doc-meta"><div style="font-size:16px;font-weight:700;">${c.clientName}</div><div>${c.name}</div><div>作成日: ${todayStr()}</div><div>担当: ${assigneeName(c.assignee)}</div></div>
        </div>
        <h2>進捗サマリー</h2>
        <div class="grid3">
          <div class="kpi-card"><div class="label">タスク進捗</div><div class="kpi-val">${progress}%</div><div style="font-size:11px;color:#777;">${doneTasks} / ${totalTasks} 完了</div></div>
          <div class="kpi-card"><div class="label">顧客満足度</div><div class="kpi-val">${latestSat ? latestSat.total : '-'}<span style="font-size:12px;color:#777;">/100</span></div>${latestSat ? `<div class="sat-bar"><div class="sat-fill" style="width:${latestSat.total}%;background:${latestSat.total>=80?'#4caf50':latestSat.total>=60?'#ff9800':'#f44336'};"></div></div>` : ''}</div>
          <div class="kpi-card"><div class="label">フェーズ</div><div class="kpi-val" style="font-size:16px;">${c.phase}</div></div>
        </div>
        <h2>KPI実績</h2>
        ${(c.kpis || []).length > 0
          ? `<table><thead><tr><th>指標</th><th>目標</th><th>実績</th><th>前回</th><th>達成率</th></tr></thead><tbody>${c.kpis.map(k=>{
              const rate = k.target > 0 ? Math.round(k.actual/k.target*100) : 0;
              return `<tr><td>${k.name}（${k.unit}）</td><td>${k.target}</td><td>${k.actual}</td><td>${k.prevActual||'-'}</td><td><span class="${rate>=100?'badge-ok':'badge-ng'}">${rate}%</span></td></tr>`;
            }).join('')}</tbody></table>`
          : '<p style="color:#999;font-size:12px;">KPIデータがありません</p>'
        }
        <h2>今月のROI</h2>
        ${(c.roi || []).length > 0
          ? `<table><thead><tr><th>施策</th><th>指標</th><th>改善前</th><th>改善後</th><th>ROI</th></tr></thead><tbody>${c.roi.map(r=>{
              const {roi} = calcROI(r);
              return `<tr><td>${r.measureName}</td><td>${r.metric}</td><td>${Number(r.beforeValue).toLocaleString()}</td><td>${Number(r.afterValue).toLocaleString()}</td><td style="font-weight:700;color:${roi>=0?'#1e7e34':'#c62828'}">${roi!==null?(roi>=0?'+':'')+roi.toFixed(1)+'%':'-'}</td></tr>`;
            }).join('')}</tbody></table>`
          : '<p style="color:#999;font-size:12px;">ROIデータがありません</p>'
        }
        <h2>直近の議事録・ネクストアクション</h2>
        ${latestMin
          ? `<div style="margin-bottom:8px;"><strong>${fmtDate(latestMin.date)}</strong> — ${latestMin.title}</div>
             ${latestMin.body ? `<p style="font-size:12px;color:#555;margin-bottom:12px;">${latestMin.body.replace(/\n/g,'<br>')}</p>` : ''}
             ${nextActions.length > 0
               ? `<table><thead><tr><th>アクション</th><th>担当</th><th>期日</th></tr></thead><tbody>${nextActions.map(na=>`<tr><td>${na.text}</td><td>${assigneeName(na.assignee)}</td><td>${fmtDate(na.dueDate)}</td></tr>`).join('')}</tbody></table>`
               : '<p style="font-size:12px;color:#777;">未完了アクションなし</p>'}`
          : '<p style="color:#999;font-size:12px;">議事録がありません</p>'
        }
        <h2>来月に向けて</h2>
        <div style="border:1px solid #ddd;border-radius:4px;padding:16px;min-height:60px;color:#999;font-size:12px;">（コメントを追記してください）</div>
      `);
    }

    renderAll();
  </script>
</body>
</html>
